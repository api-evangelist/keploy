name: Keploy
description: >-
  Open-source, AI-native testing platform that captures real production API traffic with eBPF and replays it in CI as
  deterministic tests, auto-generated mocks, and production-like sandboxes with zero code changes. Offers a Cloud REST
  API, a hosted MCP server, llms.txt, and generated agent skills.
