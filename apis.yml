apis:
  - name: Keploy Cloud API
    description: >-
      REST API for Keploy Cloud providing test generation and execution capabilities, app/test-suite management,
      recordings/mocks, test reports, schema coverage, API keys, clusters, and account/subscription info. Authenticated
      via scoped API keys (KEPLOY_API_KEY). Base URL confirmed via third-party MCP registry rather than a loadable page
      on Keploy's own site.
    humanURL: https://keploy.io/docs
